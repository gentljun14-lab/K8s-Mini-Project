apiVersion: apps/v1
kind: Deployment
metadata:
  name: connected-car-query
  namespace: miniproject
  labels:
    app: connected-car-query
    tier: backend
    cqrs: query
spec:
  replicas: 2
  selector:
    matchLabels:
      app: connected-car-query
  template:
    metadata:
      labels:
        app: connected-car-query
        tier: backend
        cqrs: query
    spec:
      containers:
        - name: query-api
          image: hyunjun0907/mobility-query-api:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "100m"
              memory: "200Mi"
            limits:
              cpu: "500m"
              memory: "400Mi"
          env:
            - name: QUERY_API_PORT
              valueFrom:
                configMapKeyRef:
                  name: mobility-config
                  key: QUERY_API_PORT
            - name: QUERY_API_HOST
              valueFrom:
                configMapKeyRef:
                  name: mobility-config
                  key: QUERY_API_HOST
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: mobility-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: mobility-config
                  key: REDIS_PORT
            - name: REDIS_KEY_PATTERN
              valueFrom:
                configMapKeyRef:
                  name: mobility-config
                  key: REDIS_KEY_PATTERN
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mobility-secret
                  key: REDIS_PASSWORD
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 2
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: connected-car-query-svc
  namespace: miniproject
  labels:
    app: connected-car-query
spec:
  type: ClusterIP
  selector:
    app: connected-car-query
  ports:
    - name: http
      port: 80
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: connected-car-query-consumer
  namespace: miniproject
  labels:
    app: connected-car-query-consumer
    tier: worker
    cqrs: query
spec:
  replicas: 2
  selector:
    matchLabels:
      app: connected-car-query-consumer
  template:
    metadata:
      labels:
        app: connected-car-query-consumer
        tier: worker
        cqrs: query
    spec:
      containers:
        - name: query-consumer
          image: hyunjun0907/mobility-query-consumer:v1
          imagePullPolicy: Always
          command:
            - "python"
            - "-u"
            - "/app/query-consumer.py"
          resources:
            requests:
              cpu: "150m"
              memory: "128Mi"
            limits:
              cpu: "600m"
              memory: "256Mi"
          envFrom:
            - configMapRef:
                name: mobility-config
          env:
            - name: KAFKA_GROUP_ID
              valueFrom:
                configMapKeyRef:
                  name: mobility-config
                  key: KAFKA_GROUP_ID_QUERY
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mobility-secret
                  key: REDIS_PASSWORD
