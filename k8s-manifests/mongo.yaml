apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo
  namespace: miniproject
  labels:
    app: mongo
spec:
  serviceName: mongo-hl-svc
  replicas: 1
  selector:
    matchLabels:
      app: mongo
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
      - name: mongo
        image: mongo:7
        args: ["--wiredTigerCacheSizeGB", "0.25"]
        ports:
        - containerPort: 27017
        volumeMounts:
        - name: mongo-data
          mountPath: /data/db
        livenessProbe:
          tcpSocket:
            port: 27017
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 5
        readinessProbe:
          tcpSocket:
            port: 27017
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 5
  volumeClaimTemplates:
    - metadata:
        name: mongo-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: nfs-storage
        resources:
          requests:
            storage: 5Gi

---
apiVersion: v1
kind: Service
metadata:
  name: mongo-hl-svc
  namespace: miniproject
  labels:
    app: mongo
spec:
  clusterIP: None
  selector:
    app: mongo
  ports:
    - name: mongo
      port: 27017
      targetPort: 27017

---
apiVersion: v1
kind: Service
metadata:
  name: mongo-svc
  namespace: miniproject
spec:
  selector:
    app: mongo
  ports:
  - port: 27017
    targetPort: 27017

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: mongo-telemetry-retention
  namespace: miniproject
  labels:
    app: mongo
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  timeZone: UTC
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: retention-cleaner
              image: mongo:7
              command:
                - "bash"
                - "-lc"
                - |
                  set -eu
                  CUTOFF=$(date -u -d "7 days ago" +%Y-%m-%dT%H:%M:%S+00:00)
                  mongosh mongodb://mongo-svc:27017/connected_car --eval '
                    const cutoff = "'$CUTOFF'";
                    const query = {
                      $or: [
                        { received_at: { $lt: cutoff } },
                        { _consumed_at: { $lt: cutoff } }
                      ]
                    };
                    const result = db.telemetry_history.deleteMany(query);
                    printjson({ removed_count: result.deletedCount, cutoff: cutoff, ok: result.ok });
                  '
