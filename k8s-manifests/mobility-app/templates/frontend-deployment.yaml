apiVersion: apps/v1
kind: Deployment
metadata:
  name: connected-car-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    app: connected-car-frontend
    tier: frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }} # 변수 뚫기 1
  selector:
    matchLabels:
      app: connected-car-frontend
  template:
    metadata:
      labels:
        app: connected-car-frontend
        tier: frontend
    spec:
      containers:
        - name: frontend
          # 변수 뚫기 2 (문자열 조합)
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
          - containerPort: 80
          env:
            - name: VWORLD_API_KEY
              valueFrom:
                secretKeyRef:
                  name: mobility-secret
                  key: VWORLD_API_KEY
            - name: QUERY_API_URL
              valueFrom:
                configMapKeyRef:
                  name: mobility-config
                  key: QUERY_API_URL
            - name: VITE_QUERY_API_URL
              valueFrom:
                configMapKeyRef:
                  name: mobility-config
                  key: FRONTEND_QUERY_API_URL
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 2
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: connected-car-frontend-svc
  namespace: {{ .Release.Namespace }}
  labels:
    app: connected-car-frontend
spec:
  type: NodePort
  selector:
    app: connected-car-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30001
