services:
  # --- 인프라 영역 ---
  mongodb:
    image: mongo:latest
    container_name: mobility-mongodb
    ports:
      - "27017:27017"

  redis:
    image: redis:alpine
    container_name: mobility-redis
    ports:
      - "6379:6379"

  kafka:
    image: apache/kafka:latest
    container_name: mobility-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1

  # --- 서비스 영역 (도커 허브 이미지 활용) ---
  ingest-server:
    image: sbddjt/cqrs-write-server:v1 # 쓰기 서비스 이미지
    container_name: mobility-ingest-server
    # command는 이미지 내의 설정을 따르되, 필요시 여기서 덮어씌울 수 있습니다.
    ports:
      - "8080:8000"
    environment:
      - MONGO_URL=mongodb://mongodb:27017/ #
      - KAFKA_BROKER=kafka:9092             #
    depends_on:
      - mongodb
      - kafka

  query-api:
    image: hyunjun0907/mobility-query-api:v1.0.0 # 읽기 API 이미지
    container_name: mobility-query-api
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis             #
      - QUERY_API_PORT=8000          #
    depends_on:
      - redis

  query-consumer:
    image: hyunjun0907/mobility-query-consumer:v1.0.0 # 읽기 컨슈머 이미지
    container_name: mobility-query-consumer
    # 이미 빌드된 이미지라도 실행 명령어(command)를 명시해주는 것이 안전합니다.
    command: python consumer.py #
    environment:
      - KAFKA_BOOTSTRAP=kafka:9092    #
      - KAFKA_TOPIC=car-live-updates #
      - REDIS_HOST=redis             #
      - REDIS_TTL_SEC=60             #
    depends_on:
      - kafka
      - redis
