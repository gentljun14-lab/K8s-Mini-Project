apiVersion: v1
kind: ConfigMap
metadata:
  name: mobility-config
  namespace: {{ .Release.Namespace }}
  labels:
    app: connected-car
data:
  # --- Kafka ---
  KAFKA_BROKERS: "kafka-svc:9092"
  KAFKA_BOOTSTRAP: "kafka-svc:9092"
  KAFKA_TOPIC: "car.telemetry.events"
  KAFKA_GROUP_ID: "vehicle-projector"
  KAFKA_GROUP_ID_COMMAND: "vehicle-command"
  KAFKA_GROUP_ID_QUERY: "vehicle-query"
  KAFKA_POLL_TIMEOUT_MS: "1000"
  KAFKA_RETRY_SEC: "3"

  # --- MongoDB ---
  MONGO_DB: "car_db"
  MONGO_COLLECTION: "telemetry_history"
  MONGO_TTL_DAYS: {{ .Values.mongo.retention.days | quote }}
  MONGO_TTL_MINUTES: {{ default "10080" .Values.mongo.retention.minutes | quote }}

  # --- Redis ---
  REDIS_HOST: "redis-svc"
  REDIS_PORT: "6379"
  REDIS_TTL_SEC: "60"
  REDIS_KEY_PATTERN: "vehicle:*:latest"
  REDIS_ACTIVE_IDS_KEY: "vehicle:active_ids"
  REDIS_ACTIVE_IDS_LEX_KEY: "vehicle:active_ids:lex"
  REDIS_ACTIVE_WINDOW_MS: "120000"

  # --- API Ports ---
  QUERY_API_PORT: "8000"
  QUERY_API_HOST: "0.0.0.0"
  FRONTEND_QUERY_API_URL: "/api"
  QUERY_API_URL: "http://connected-car-query-svc"

  # --- Dummy Data Server ---
  INGEST_SERVER_URL: "http://connected-car-command-svc/api/query/telemetry"
