services:
  mongodb:
    image: mongo:latest
    container_name: mobility-mongodb
    ports:
      - "27017:27017"

  redis:
    image: redis:alpine
    container_name: mobility-redis
    ports:
      - "6379:6379"

  kafka:
    image: apache/kafka:latest
    container_name: mobility-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1

  ingest-server:
    image: sbddjt/cqrs-write-server:v1 
    container_name: mobility-ingest-server
    ports:
      - "8080:8000"
    environment:
      - MONGO_URL=mongodb://mongodb:27017/ #
      - KAFKA_BROKERS=kafka:9092             #
    depends_on:
      - mongodb
      - kafka

  query-api:
    image: hyunjun0907/mobility-query-api:v1.0.0 
    container_name: mobility-query-api
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis             #
      - QUERY_API_PORT=8000          #
    depends_on:
      - redis

  query-consumer:
    image: hyunjun0907/mobility-query-consumer:v1.0.0 
    container_name: mobility-query-consumer
    command: python consumer.py #
    environment:
      - KAFKA_BOOTSTRAP=kafka:9092    #
      - KAFKA_TOPIC=car.telemetry.events #
      - REDIS_HOST=redis             #
      - REDIS_TTL_SEC=60             #
    depends_on:
      - kafka
      - redis

