apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mobility-api-ingress
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
    - host: mobility.local
      http:
        paths:
          - path: /api/v1/telemetry
            pathType: Prefix
            backend:
              service:
                name: connected-car-command-svc
                port:
                  number: 80
          - path: /api/v1
            pathType: Prefix
            backend:
              service:
                name: connected-car-query-svc   # query service 이름으로 변경
                port:
                  number: 80
