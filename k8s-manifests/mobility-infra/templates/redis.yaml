apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: {{ .Release.Namespace }}
  labels:
    app: redis
spec:
  replicas: 1
  serviceName: redis-hl-svc
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      annotations:
        checksum/mobility-secret: {{ include "mobility-infra.mobilitySecretChecksum" . | quote }}
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: "{{ .Values.redis.image }}"
          command:
            - "sh"
            - "-c"
            - "redis-server --requirepass \"$REDIS_PASSWORD\" --save '' --appendonly no --maxmemory 256mb --maxmemory-policy allkeys-lru"
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mobility-secret
                  key: REDIS_PASSWORD
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: redis-data
              mountPath: /data
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 5
          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 5
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.persistence.storageClass }}
        resources:
          requests:
            storage: {{ .Values.redis.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: redis-hl-svc
  namespace: {{ .Release.Namespace }}
  labels:
    app: redis
spec:
  clusterIP: None
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis-svc
  namespace: {{ .Release.Namespace }}
  labels:
    app: redis
spec:
  type: ClusterIP
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: redis-vehicle-latest-cleanup
  namespace: {{ .Release.Namespace }}
  labels:
    app: redis
spec:
  schedule: "*/10 * * * *"
  concurrencyPolicy: Forbid
  timeZone: UTC
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          annotations:
            checksum/mobility-secret: {{ include "mobility-infra.mobilitySecretChecksum" . | quote }}
        spec:
          restartPolicy: OnFailure
          containers:
            - name: redis-cleanup
              image: "{{ .Values.redis.image }}"
              env:
                - name: REDIS_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: mobility-secret
                      key: REDIS_PASSWORD
                - name: REDISCLI_AUTH
                  valueFrom:
                    secretKeyRef:
                      name: mobility-secret
                      key: REDIS_PASSWORD
              command:
                - "sh"
                - "-c"
                - "redis-cli -h redis-svc -p 6379 --scan --pattern 'vehicle:*:latest' | xargs -r redis-cli -h redis-svc -p 6379 del"
