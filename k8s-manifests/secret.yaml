apiVersion: v1
kind: Secret
metadata:
  name: mobility-secret
  namespace: default
  labels:
    app: connected-car
type: Opaque
stringData:
  # MongoDB 인증 정보
  MONGO_INITDB_ROOT_USERNAME: "admin"
  MONGO_INITDB_ROOT_PASSWORD: "changeme-in-production"

  # Redis 비밀번호 (현재 미사용, 추후 requirepass 설정 시 활성화)
  REDIS_PASSWORD: ""
