apiVersion: v1
kind: Secret
metadata:
  name: mobility-secret
  namespace: {{ .Release.Namespace }}
  labels:
    app: connected-car
type: Opaque
{{- $legacySecrets := default dict .Values.secret }}
{{- $newSecrets := default dict .Values.secrets }}
{{- $mongoRootUsername := coalesce (get $newSecrets "mongoRootUsername") (get $legacySecrets "mongoRootUsername") "" }}
{{- $mongoRootPassword := coalesce (get $newSecrets "mongoRootPassword") (get $legacySecrets "mongoRootPassword") "" }}
{{- $mongoUri := coalesce (get $newSecrets "mongoUri") (get $legacySecrets "mongoUri") "" }}
{{- $redisPassword := coalesce (get $newSecrets "redisPassword") (get $legacySecrets "redisPassword") "" }}
{{- $vworldApiKey := coalesce (get $newSecrets "vworldApiKey") (get $legacySecrets "vworldApiKey") "" }}
stringData:
  MONGO_INITDB_ROOT_USERNAME: {{ $mongoRootUsername | quote }}
  MONGO_INITDB_ROOT_PASSWORD: {{ $mongoRootPassword | quote }}
  MONGO_URI: {{ $mongoUri | quote }}
  REDIS_PASSWORD: {{ $redisPassword | quote }}
  VWORLD_API_KEY: {{ $vworldApiKey | quote }}
