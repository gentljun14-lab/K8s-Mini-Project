apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo
  namespace: {{ .Release.Namespace }}
  labels:
    app: mongo
spec:
  serviceName: mongo-hl-svc
  replicas: 1
  selector:
    matchLabels:
      app: mongo
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      annotations:
        checksum/mobility-secret: {{ include "mobility-infra.mobilitySecretChecksum" . | quote }}
      labels:
        app: mongo
    spec:
      containers:
      - name: mongo
        image: "{{ .Values.mongo.image }}"
        args: ["--auth", "--wiredTigerCacheSizeGB", "0.25"]
        env:
          - name: MONGO_INITDB_ROOT_USERNAME
            valueFrom:
              secretKeyRef:
                name: mobility-secret
                key: MONGO_INITDB_ROOT_USERNAME
          - name: MONGO_INITDB_ROOT_PASSWORD
            valueFrom:
              secretKeyRef:
                name: mobility-secret
                key: MONGO_INITDB_ROOT_PASSWORD
        ports:
        - containerPort: 27017
        volumeMounts:
        - name: mongo-data
          mountPath: /data/db
        livenessProbe:
          tcpSocket:
            port: 27017
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 5
        readinessProbe:
          tcpSocket:
            port: 27017
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 5
  volumeClaimTemplates:
    - metadata:
        name: mongo-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.persistence.storageClass }}
        resources:
          requests:
            storage: {{ .Values.mongo.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: mongo-hl-svc
  namespace: {{ .Release.Namespace }}
  labels:
    app: mongo
spec:
  clusterIP: None
  selector:
    app: mongo
  ports:
    - name: mongo
      port: 27017
      targetPort: 27017
---
apiVersion: v1
kind: Service
metadata:
  name: mongo-svc
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: mongo
  ports:
  - port: 27017
    targetPort: 27017
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: mongo-telemetry-retention
  namespace: {{ .Release.Namespace }}
  labels:
    app: mongo
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  timeZone: UTC
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          annotations:
            checksum/mobility-secret: {{ include "mobility-infra.mobilitySecretChecksum" . | quote }}
        spec:
          restartPolicy: OnFailure
          containers:
            - name: mongo-retention
              image: "{{ .Values.mongo.image }}"
              env:
                - name: MONGO_URI
                  valueFrom:
                    secretKeyRef:
                      name: mobility-secret
                      key: MONGO_URI
                - name: MONGO_TTL_MINUTES
                  valueFrom:
                    configMapKeyRef:
                      name: mobility-config
                      key: MONGO_TTL_MINUTES
                - name: MONGO_TTL_DAYS
                  valueFrom:
                    configMapKeyRef:
                      name: mobility-config
                      key: MONGO_TTL_DAYS
              command:
                - "sh"
                - "-c"
                - |
                  RETENTION_MINUTES="${MONGO_TTL_MINUTES}"
                  if [ -z "$RETENTION_MINUTES" ] || [ "$RETENTION_MINUTES" -le 0 ]; then
                    RETENTION_MINUTES=$((MONGO_TTL_DAYS * 24 * 60))
                  fi

                  mongosh "$MONGO_URI" --eval "
                    db.getSiblingDB('car_db').telemetry_history.deleteMany({
                      created_at: { \$lt: new Date(Date.now() - ${RETENTION_MINUTES} * 60 * 1000) }
                    })
                  "
