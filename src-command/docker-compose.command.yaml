version: "3.8"

services:
  command-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: command-api:0.1.0
    container_name: command-api
    environment:
      MONGO_URI: "mongodb://mongo:27017/car_db"
      MONGO_DB: "car_db"
      MONGO_COLLECTION: "car_logs"
      KAFKA_BROKERS: "kafka:9092"
      KAFKA_TOPIC: "car.telemetry.events"
      KAFKA_ENABLED: "true"
    ports:
      - "8000:8000"
    depends_on:
      - mongo
      - kafka
    restart: always

  mongo:
    image: mongo:7
    container_name: command-mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: car_db

  kafka:
    image: apache/kafka:3.9.0
    container_name: command-kafka
    restart: always
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,CONTROLLER://kafka:9093"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      ALLOW_PLAINTEXT_LISTENER: "yes"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: command-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: ""
*** End Patch
