proxy_cache_path /var/cache/nginx/tiles levels=1:2 keys_zone=tile_cache:32m max_size=1g inactive=7d use_temp_path=off;

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/map/ {
        rewrite ^/api/map/tiles/(.*)$ /req/wmts/1.0.0/${VWORLD_API_KEY}/Base/$1.png break;
        proxy_pass https://api.vworld.kr;
        proxy_ssl_server_name on;
        proxy_cache tile_cache;
        proxy_cache_key "$scheme$proxy_host$uri$is_args$args";
        proxy_cache_lock on;
        proxy_cache_background_update on;
        proxy_cache_use_stale error timeout invalid_header updating http_500 http_502 http_503 http_504;
        proxy_cache_valid 200 30d;
        proxy_cache_valid 404 1m;
        proxy_ignore_headers Set-Cookie Cache-Control Expires;
        proxy_hide_header Set-Cookie;
        add_header Cache-Control "public, max-age=86400, s-maxage=2592000" always;
        add_header X-Cache-Status $upstream_cache_status always;
    }

    location /ws/vehicles {
        proxy_pass ${QUERY_API_URL}/api/vehicles/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /api/ {
        proxy_pass ${QUERY_API_URL}/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
