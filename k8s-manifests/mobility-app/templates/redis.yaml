apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: {{ .Release.Namespace }}
  labels:
    app: redis
spec:
  replicas: 1
  serviceName: redis-hl-svc
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command:
            - "sh"
            - "-c"
            - "redis-server --requirepass \"$REDIS_PASSWORD\" --save '' --appendonly no --maxmemory 256mb --maxmemory-policy allkeys-lru"
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mobility-secret
                  key: REDIS_PASSWORD
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: redis-data
              mountPath: /data
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 5
          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 5
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: nfs-storage
        resources:
          requests:
            storage: 2Gi

---
apiVersion: v1
kind: Service
metadata:
  name: redis-hl-svc
  namespace: {{ .Release.Namespace }}
  labels:
    app: redis
spec:
  clusterIP: None
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379

---
apiVersion: v1
kind: Service
metadata:
  name: redis-svc
  namespace: {{ .Release.Namespace }}
  labels:
    app: redis
spec:
  type: ClusterIP
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: redis-vehicle-latest-cleanup
  namespace: {{ .Release.Namespace }}
  labels:
    app: redis
spec:
  schedule: "*/10 * * * *"
  concurrencyPolicy: Forbid
  timeZone: UTC
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: cleanup
              image: redis:7-alpine
              env:
                - name: REDIS_HOST
                  value: "redis-svc"
                - name: REDIS_PORT
                  value: "6379"
                - name: REDISCLI_AUTH
                  valueFrom:
                    secretKeyRef:
                      name: mobility-secret
                      key: REDIS_PASSWORD
              command:
                - /bin/sh
                - -lc
                - |
                  set -eu
                  redis-cli -h "$REDIS_HOST" -p "$REDIS_PORT" --scan --pattern "vehicle:*:latest" |
                  while read -r key; do
                    # Keep latest key set: if TTL missing (legacy data), remove it.
                    ttl=$(redis-cli -h "$REDIS_HOST" -p "$REDIS_PORT" ttl "$key")
                    if [ "$ttl" = "-1" ]; then
                      redis-cli -h "$REDIS_HOST" -p "$REDIS_PORT" del "$key" >/dev/null
                    fi
                  done
