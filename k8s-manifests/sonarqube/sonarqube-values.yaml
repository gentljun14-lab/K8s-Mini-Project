community:
  enabled: true

monitoringPasscode: "admin1234!"

persistence:
  enabled: true
  storageClass: "nfs-storage"
  size: 10Gi

postgresql:
  primary:
    persistence:
      storageClass: "nfs-storage"
      size: 5Gi

service:
  type: NodePort
  nodePort: 30009

resources:
  requests:
    memory: "2Gi"
    cpu: "500m"
  limits:
    memory: "4Gi"
    cpu: "2000m"

account:
  adminPassword: "admin1234!"

# startup probe 타임아웃 늘리기
startupProbe:
  initialDelaySeconds: 60
  periodSeconds: 10
  failureThreshold: 18