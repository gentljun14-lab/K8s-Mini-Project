grafana:
  grafana.ini:
    server:
      root_url: "http://192.168.202.243:50031/grafana/"
      serve_from_sub_path: true

prometheus:
  prometheusSpec:
    externalUrl: "http://192.168.202.243:50031/prometheus"
    routePrefix: "/prometheus"

alertmanager:
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by:
        - alertname
        - namespace
        - pod
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: discord
    receivers:
      - name: discord
        webhook_configs:
          - url: ""
            send_resolved: true
