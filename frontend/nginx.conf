server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # /api/map/은 /api/보다 먼저 선언해야 우선 매칭됨
    location /api/map/ {
        rewrite ^/api/map/tiles/(.*)$ /req/wmts/1.0.0/${VWORLD_API_KEY}/Base/$1.png break;
        proxy_pass https://api.vworld.kr;
        proxy_ssl_server_name on;
    }

    # ${QUERY_API_URL} = http://connected-car-query-svc
    # 결과: proxy_pass http://connected-car-query-svc/api/
    location /api/ {
        proxy_pass ${QUERY_API_URL}/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
