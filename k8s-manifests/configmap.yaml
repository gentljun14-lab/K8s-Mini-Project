apiVersion: v1
kind: ConfigMap
metadata:
  name: mobility-config
  namespace: miniproject
  labels:
    app: connected-car
data:
  # --- Kafka ---
  KAFKA_BROKERS: "kafka-svc:9092"
  KAFKA_BOOTSTRAP: "kafka-svc:9092"
  KAFKA_TOPIC: "car.telemetry.events"
  KAFKA_GROUP_ID: "vehicle-projector"
  KAFKA_GROUP_ID_COMMAND: "vehicle-command"
  KAFKA_GROUP_ID_QUERY: "vehicle-query"
  KAFKA_POLL_TIMEOUT_MS: "1000"
  KAFKA_RETRY_SEC: "3"

  # --- MongoDB ---
  MONGO_URI: "mongodb://mongo-svc:27017"
  MONGO_DB: "car_db"
  MONGO_COLLECTION: "telemetry_history"
  MONGO_TTL_DAYS: "7"

  # --- Redis ---
  REDIS_HOST: "redis-svc"
  REDIS_PORT: "6379"
  REDIS_TTL_SEC: "60"
  REDIS_KEY_PATTERN: "vehicle:*:latest"

  # --- API Ports ---
  QUERY_API_PORT: "8000"
  QUERY_API_HOST: "0.0.0.0"

  # --- Dummy Data Server ---
  INGEST_SERVER_URL: "http://connected-car-command-svc/api/query/telemetry"

