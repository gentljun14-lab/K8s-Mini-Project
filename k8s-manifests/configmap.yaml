apiVersion: v1
kind: ConfigMap
metadata:
  name: mobility-config
  namespace: default
  labels:
    app: connected-car
data:
  # --- Kafka ---
  KAFKA_BROKER: "kafka-svc:9092"
  KAFKA_BOOTSTRAP: "kafka-svc:9092"
  KAFKA_TOPIC: "car-live-updates"
  KAFKA_GROUP_ID: "vehicle-projector"

  # --- MongoDB ---
  MONGO_URL: "mongodb://mongodb-svc:27017/"
  MONGO_DB: "car_db"
  MONGO_COLLECTION: "car_logs"

  # --- Redis ---
  REDIS_HOST: "redis-svc"
  REDIS_PORT: "6379"
  REDIS_TTL_SEC: "60"

  # --- API Ports ---
  QUERY_API_PORT: "8000"
  QUERY_API_HOST: "0.0.0.0"

  # --- Dummy Data Server ---
  # Command API(Ingest)의 ClusterIP 서비스 주소로 수신
  INGEST_SERVER_URL: "http://connected-car-command-svc/api/query/telemetry"
