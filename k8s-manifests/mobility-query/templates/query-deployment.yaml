apiVersion: apps/v1
kind: Deployment
metadata:
  name: connected-car-query
  namespace: {{ .Release.Namespace }}
  labels:
    app: connected-car-query
    tier: backend
    cqrs: query
spec:
  replicas: {{ .Values.query.api.replicaCount }}
  selector:
    matchLabels:
      app: connected-car-query
  template:
    metadata:
      annotations:
        checksum/mobility-secret: {{ include "mobility-query.mobilitySecretChecksum" . | quote }}
      labels:
        app: connected-car-query
        tier: backend
        cqrs: query
    spec:
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      containers:
        - name: query-api
          image: "{{ .Values.query.api.image }}"
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "100m"
              memory: "200Mi"
            limits:
              cpu: "500m"
              memory: "400Mi"
          env:
            - name: QUERY_API_PORT
              valueFrom:
                configMapKeyRef:
                  name: mobility-config
                  key: QUERY_API_PORT
            - name: QUERY_API_HOST
              valueFrom:
                configMapKeyRef:
                  name: mobility-config
                  key: QUERY_API_HOST
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: mobility-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: mobility-config
                  key: REDIS_PORT
            - name: REDIS_KEY_PATTERN
              valueFrom:
                configMapKeyRef:
                  name: mobility-config
                  key: REDIS_KEY_PATTERN
            - name: REDIS_ACTIVE_IDS_KEY
              valueFrom:
                configMapKeyRef:
                  name: mobility-config
                  key: REDIS_ACTIVE_IDS_KEY
            - name: REDIS_ACTIVE_IDS_LEX_KEY
              valueFrom:
                configMapKeyRef:
                  name: mobility-config
                  key: REDIS_ACTIVE_IDS_LEX_KEY
            - name: REDIS_ACTIVE_WINDOW_MS
              valueFrom:
                configMapKeyRef:
                  name: mobility-config
                  key: REDIS_ACTIVE_WINDOW_MS
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mobility-secret
                  key: REDIS_PASSWORD
            - name: MONGO_DB
              valueFrom:
                configMapKeyRef:
                  name: mobility-config
                  key: MONGO_DB
            - name: MONGO_COLLECTION
              valueFrom:
                configMapKeyRef:
                  name: mobility-config
                  key: MONGO_COLLECTION
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: mobility-secret
                  key: MONGO_URI
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 2
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: connected-car-query-svc
  namespace: {{ .Release.Namespace }}
  labels:
    app: connected-car-query
spec:
  type: ClusterIP
  selector:
    app: connected-car-query
  ports:
    - name: http
      port: 80
      targetPort: 8000
---
{{- if .Values.query.api.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: connected-car-query-hpa
  namespace: {{ .Release.Namespace }}
  labels:
    app: connected-car-query
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: connected-car-query
  minReplicas: {{ .Values.query.api.hpa.minReplicas }}
  maxReplicas: {{ .Values.query.api.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.query.api.hpa.cpuUtilization }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: connected-car-query-consumer
  namespace: {{ .Release.Namespace }}
  labels:
    app: connected-car-query-consumer
    tier: worker
    cqrs: query
spec:
  replicas: {{ .Values.query.consumer.replicaCount }}
  selector:
    matchLabels:
      app: connected-car-query-consumer
  template:
    metadata:
      annotations:
        checksum/mobility-secret: {{ include "mobility-query.mobilitySecretChecksum" . | quote }}
      labels:
        app: connected-car-query-consumer
        tier: worker
        cqrs: query
    spec:
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      containers:
        - name: query-consumer
          image: "{{ .Values.query.consumer.image }}"
          imagePullPolicy: Always
          command:
            - "python"
            - "-u"
            - "/app/query-consumer.py"
          resources:
            requests:
              cpu: "150m"
              memory: "128Mi"
            limits:
              cpu: "600m"
              memory: "256Mi"
          envFrom:
            - configMapRef:
                name: mobility-config
          env:
            - name: KAFKA_GROUP_ID
              valueFrom:
                configMapKeyRef:
                  name: mobility-config
                  key: KAFKA_GROUP_ID_QUERY
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mobility-secret
                  key: REDIS_PASSWORD
