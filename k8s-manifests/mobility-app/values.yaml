imagePullSecrets:
  - name: harbor-secret

frontend:
  replicaCount: 1
  image: "10.0.2.111:80/k8s-mini/k8s-mini-frontend:v1.1"

command:
  api:
    replicaCount: 2
    image: "10.0.2.111:80/k8s-mini/telemetry-ingest-api:v1"
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 10
      cpuUtilization: 50
  consumer:
    replicaCount: 2
    image: "10.0.2.111:80/k8s-mini/telemetry-mongo-consumer:v1"


query:
  api:
    replicaCount: 2
    image: "10.0.2.111:80/k8s-mini/mobility-query-api:v1"
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 10
      cpuUtilization: 50
  consumer:
    replicaCount: 2
    image: "10.0.2.111:80/k8s-mini/mobility-query-consumer:v1"

persistence:
  storageClass: "nfs-storage"

mongo:
  image: "mongo:7"
  storage: "5Gi"
  retention:
    days: "7"

redis:
  image: "redis:7-alpine"
  storage: "2Gi"

kafka:
  image: "apache/kafka:3.9.0"
  storage: "10Gi"

secrets:
  mongoRootUsername: "admin"
  mongoRootPassword: ""
  mongoUri: ""
  redisPassword: ""
  vworldApiKey: ""
