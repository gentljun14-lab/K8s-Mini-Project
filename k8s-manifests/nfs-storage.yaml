apiVersion: v1
kind: PersistentVolume
metadata:
  name: mongo-pv-nfs-0
  labels:
    app: mongo
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-storage
  claimRef:
    namespace: miniproject
    name: mongo-data-mongo-0
  nfs:
    server: 10.0.2.100
    path: /srv/nfs/mongo

