apiVersion: v1
kind: Secret
metadata:
  name: mobility-secret
  namespace: {{ .Release.Namespace }}
  labels:
    app: connected-car
type: Opaque
stringData:
  # MongoDB 인증 정보
  MONGO_INITDB_ROOT_USERNAME: {{ .Values.secrets.mongoRootUsername | quote }}
  MONGO_INITDB_ROOT_PASSWORD: {{ .Values.secrets.mongoRootPassword | quote }}
  MONGO_URI: {{ .Values.secrets.mongoUri | quote }}

  # Redis 비밀번호
  REDIS_PASSWORD: {{ .Values.secrets.redisPassword | quote }}

  # VWorld 지도 API 키
  VWORLD_API_KEY: {{ .Values.secrets.vworldApiKey | quote }}
