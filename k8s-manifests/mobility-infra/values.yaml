persistence:
  storageClass: "nfs-storage"

mongo:
  image: "mongo:7"
  storage: "10Gi"
  retention:
    days: "7"
    minutes: "15"

redis:
  image: "redis:7-alpine"
  storage: "5Gi"

kafka:
  image: "apache/kafka:3.9.0"
  storage: "20Gi"

secrets:
  mongoRootUsername: "admin"
  mongoRootPassword: ""
  mongoUri: ""
  redisPassword: ""
  vworldApiKey: ""
