apiVersion: v1
kind: Secret
metadata:
  name: mobility-secret
  namespace: {{ .Release.Namespace }}
  labels:
    app: connected-car
type: Opaque
{{- $mongoRootUsername := default "" (coalesce .Values.secrets.mongoRootUsername .Values.secret.mongoRootUsername) }}
{{- $mongoRootPassword := default "" (coalesce .Values.secrets.mongoRootPassword .Values.secret.mongoRootPassword) }}
{{- $mongoUri := default "" (coalesce .Values.secrets.mongoUri .Values.secret.mongoUri) }}
{{- $redisPassword := default "" (coalesce .Values.secrets.redisPassword .Values.secret.redisPassword) }}
{{- $vworldApiKey := default "" (coalesce .Values.secrets.vworldApiKey .Values.secret.vworldApiKey) }}
stringData:
  MONGO_INITDB_ROOT_USERNAME: {{ $mongoRootUsername | quote }}
  MONGO_INITDB_ROOT_PASSWORD: {{ $mongoRootPassword | quote }}
  MONGO_URI: {{ $mongoUri | quote }}
  REDIS_PASSWORD: {{ $redisPassword | quote }}
  VWORLD_API_KEY: {{ $vworldApiKey | quote }}
